<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — Seller Circle</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#FF9900;--black:#0F1111;--dark:#131921;--dark2:#1C2730;--dark3:#232F3E;--white:#fff;--gray:#8B949E;--green:#4ade80;--border:rgba(255,153,0,0.18)}
body{font-family:'Cairo',sans-serif;background:var(--black);color:var(--white);direction:rtl;min-height:100vh;display:flex;flex-direction:column}
nav{background:rgba(15,17,17,0.97);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:20px;font-weight:900;text-decoration:none;color:var(--white)}
.nav-logo span{color:var(--orange)}

.hero{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:36px 28px;max-width:420px;width:100%}
.card-title{font-size:22px;font-weight:900;margin-bottom:6px;text-align:center}
.card-sub{font-size:13px;color:var(--gray);text-align:center;margin-bottom:28px}

.form-group{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:#ccc}
input{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:13px 14px;font-family:'Cairo',sans-serif;font-size:14px;color:var(--white);outline:none;transition:border-color .2s}
input:focus{border-color:var(--orange)}
input::placeholder{color:var(--gray)}

.forgot{display:block;text-align:left;font-size:12px;color:var(--orange);text-decoration:none;margin-top:6px}

.btn-main{width:100%;background:var(--orange);color:var(--black);font-family:'Cairo',sans-serif;font-weight:900;font-size:16px;padding:15px;border:none;border-radius:12px;cursor:pointer;margin-top:8px;transition:all .2s}
.btn-main:hover{background:#cc7a00}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--gray);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.register-link{display:block;text-align:center;background:var(--dark3);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:14px;color:var(--gray);text-decoration:none;transition:all .2s}
.register-link strong{color:var(--orange)}
.register-link:hover{border-color:rgba(255,153,0,.4)}

.back-link{display:block;text-align:center;margin-top:16px;font-size:12px;color:var(--gray);text-decoration:none}
.back-link:hover{color:var(--white)}
</style>
</head>
<body>

<nav>
  <a href="seller-circle-preview.html" class="nav-logo">Seller <span>Circle</span></a>
</nav>

<div class="hero">
  <div class="card">
    <div class="card-title">أهلاً بيك 👋</div>
    <p class="card-sub">سجّل دخولك وابدأ تعلّم البيع على أمازون</p>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" placeholder="••••••••" required>
        <a href="#" class="forgot">نسيت كلمة المرور؟</a>
      </div>
      <button type="submit" class="btn-main">تسجيل الدخول</button>
    </form>

    <div class="divider">أو</div>

    <a href="seller-circle-register.html" class="register-link">
      مش عندك حساب؟ <strong>سجّل الآن</strong>
    </a>

    <a href="seller-circle-preview.html" class="back-link">← الرجوع للصفحة الرئيسية</a>
  </div>
</div>

<script>
function handleLogin(e){
  e.preventDefault();
  // على الموقع الحقيقي: WordPress wp-login.php أو Tutor LMS login
  window.location.href = 'seller-circle-dashboard.html';
}
</script>
</body>
</html>
