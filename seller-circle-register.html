<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب — Seller Circle</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#FF9900;--black:#0F1111;--dark:#131921;--dark2:#1C2730;--dark3:#232F3E;--white:#fff;--gray:#8B949E;--green:#4ade80;--border:rgba(255,153,0,0.18)}
body{font-family:'Cairo',sans-serif;background:var(--black);color:var(--white);direction:rtl;min-height:100vh;display:flex;flex-direction:column}
nav{background:rgba(15,17,17,0.97);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:20px;font-weight:900;text-decoration:none;color:var(--white)}
.nav-logo span{color:var(--orange)}

.hero{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:36px 28px;max-width:440px;width:100%}
.card-title{font-size:22px;font-weight:900;margin-bottom:6px;text-align:center}
.card-sub{font-size:13px;color:var(--gray);text-align:center;margin-bottom:28px}

.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
.form-group{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:#ccc}
input,select{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:13px 14px;font-family:'Cairo',sans-serif;font-size:14px;color:var(--white);outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--orange)}
input::placeholder{color:var(--gray)}
select option{background:var(--dark3)}

.btn-main{width:100%;background:var(--orange);color:var(--black);font-family:'Cairo',sans-serif;font-weight:900;font-size:16px;padding:15px;border:none;border-radius:12px;cursor:pointer;margin-top:8px;transition:all .2s}
.btn-main:hover{background:#cc7a00}

.terms{font-size:11px;color:var(--gray);text-align:center;margin-top:12px;line-height:1.7}
.terms a{color:var(--orange);text-decoration:none}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--gray);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.login-link{display:block;text-align:center;background:var(--dark3);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:14px;color:var(--gray);text-decoration:none;transition:all .2s}
.login-link strong{color:var(--orange)}
.login-link:hover{border-color:rgba(255,153,0,.4)}
</style>
</head>
<body>

<nav>
  <a href="seller-circle-preview.html" class="nav-logo">Seller <span>Circle</span></a>
</nav>

<div class="hero">
  <div class="card">
    <div class="card-title">إنشاء حساب جديد 🚀</div>
    <p class="card-sub">سجّل بياناتك وادفع — وابدأ فوراً</p>

    <form onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label>الاسم الأول</label>
          <input type="text" placeholder="محمد" required>
        </div>
        <div class="form-group">
          <label>الاسم الأخير</label>
          <input type="text" placeholder="أحمد" required>
        </div>
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label>رقم الهاتف</label>
        <input type="tel" placeholder="01xxxxxxxxx" required>
      </div>
      <div class="form-group">
        <label>الدولة</label>
        <select required>
          <option value="" disabled selected>اختار دولتك</option>
          <option value="eg">🇪🇬 مصر</option>
          <option value="sa">🇸🇦 السعودية</option>
          <option value="ae">🇦🇪 الإمارات</option>
        </select>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" placeholder="8 أحرف على الأقل" minlength="8" required>
      </div>
      <button type="submit" class="btn-main">إنشاء الحساب والمتابعة للدفع 🚀</button>
    </form>

    <p class="terms">بالتسجيل، أنت موافق على <a href="#">الشروط والأحكام</a> وسياسة الخصوصية</p>

    <div class="divider">عندك حساب بالفعل؟</div>
    <a href="seller-circle-login.html" class="login-link">
      <strong>سجّل دخولك هنا</strong>
    </a>
  </div>
</div>

<script>
function handleRegister(e){
  e.preventDefault();
  // على الموقع الحقيقي: WordPress wp-register أو Tutor LMS
  window.location.href = 'seller-circle-checkout.html';
}
</script>
</body>
</html>
